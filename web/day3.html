<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <title>JavaScript Day 1</title>
    <style>
      body{
        font-family: 'Segoe UI',sans-serif;
        background:black;
        color:white;
        padding: 40px;
        max-width: 600px;
        margin:0 auto;
      }
      button{
        background: #00d4ff;
        color: #000;
        border:none;
        padding: 10px 20px;
        font-size: 1rem;
        border-radius: 6px;
        cursor: pointer;
        margin:8px 4px;
      }
      #output {
        margin-top: 20px;
        background:#1a1a1a;
        padding:20px;
        border-radius: 8px;
        min-height:60px;
        font-size:1.1rem; 

      }
    </style>
  </head>
  <body>
    <h1>JavaScript Basics</h1>
    <button onclick="sayhello()">Say Hello</button>
    <button onclick="showAge()">Show Age</button>
    <button onclick="calculate()">Calculate</button>
    <button onclick="changeColor()">Change Color</button>
    <div id="output">Output will appear here....</div>
    <script src="day3.js"></script>
  </body>
</html>
